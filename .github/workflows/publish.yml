name: Publish to Maven Central
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  prepare:
    name: Prepare version information
    runs-on: ubuntu-latest
    outputs:
      version-date: ${{ steps.determine-version.outputs.version-date }}
      release-version: ${{ steps.determine-version.outputs.release-version }}
    steps:
      - name: Determine version
        id: determine-version
        run: |
          VERSION_DATE=$(date -u '+%Y%m%d.%H%M%S')
          echo "version-date=$VERSION_DATE" >> $GITHUB_OUTPUT
          
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_VERSION="${TAG_NAME#v}"
          echo "release-version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

  snapshot:
    name: Publish snapshot
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    needs: prepare
    uses: ./.github/workflows/x-publish.yml
    with:
      snapshot: 'true'
      version: ${{ needs.prepare.outputs.version-date }}

  release:
    name: Publish release
    if: github.ref_type == 'tag'
    needs: prepare
    uses: ./.github/workflows/x-publish.yml
    with:
      snapshot: 'false'
      version: ${{ needs.prepare.outputs.release-version }}
