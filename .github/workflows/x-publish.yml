name: Publish
on:
  workflow_call:
    inputs:
      snapshot:
        description: Whether this artifact is a snapshot
        type: boolean
        default: true
    secrets:
      GRADLE_ENCRYPTION_KEY:
        required: true
      MAVEN_CENTRAL_USERNAME:
        required: true
      MAVEN_CENTRAL_PASSWORD:
        required: true
      SIGNING_KEY:
        required: true
      SIGNING_KEY_PASSWORD:
        required: true

jobs:
  prepare:
    name: Prepare version information
    runs-on: ubuntu-latest
    outputs:
      version-name: ${{ steps.prepare-release-version.outputs.version-name || steps.prepare-snapshot-version.outputs.version-name }}
    steps:
      - name: Prepare release version
        id: prepare-release-version
        if: inputs.snapshot == false
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION_NAME="${TAG_NAME#v}"
          echo "version-name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Prepare snapshot version
        id: prepare-snapshot-version
        if: inputs.snapshot == true
        run: |
          VERSION_NAME="$(date -u '+%Y%m%d')-SNAPSHOT"
          echo "version-name=$VERSION_NAME" >> $GITHUB_OUTPUT

  publish:
    name: Publish ${{ needs.prepare.outputs.version-name }}
    needs: prepare
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_VERSION_NAME: ${{ needs.prepare.outputs.version-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: 'true'

      - name: Prepare Java & Gradle
        uses: ./.github/actions/prepare-gradle
        with:
          gradle-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-overwrite-existing: 'true'

      - name: Generate documentation
        run: ./gradlew dokkaGenerate

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralPublishing: 'true'
          ORG_GRADLE_PROJECT_signAllPublications: 'true'

          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload static files as artifact
        id: docs-deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/dokka/html/

  publish-docs:
    name: Publish documentation
    if: inputs.snapshot == false
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.docs-deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
